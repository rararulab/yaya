name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - core (runtime, engine, core logic)
        - kernel (agent loop, plugin registry, event bus)
        - plugins (bundled or external plugin protocol)
        - cli (command-line interface)
        - ci (CI/CD, build, release)
        - docs (documentation)
    validations:
      required: true

  - type: dropdown
    id: agent-owner
    attributes:
      label: Agent owner
      description: Who should implement the first pass?
      options:
        - agent:codex
        - agent:claude
        - human / unassigned
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `...`
        2. Send request to ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Relevant log output or error messages.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of the relevant version command.
      placeholder: "v0.1.0"

  - type: textarea
    id: agent-task-packet
    attributes:
      label: Agent Task Packet
      description: Context the implementation agent must read before editing.
      value: |
        ### Read First
        - `GOAL.md`
        - `AGENT.md`
        - Area-specific docs, specs, and folder `AGENT.md` files

        ### Expected Touch Points
        - 

        ### Forbidden / Avoid
        - 

        ### Existing Patterns
        - 

        ### Validation
        - `just check`
        - `just test`

        ### Failure Modes To Cover
        - 
      render: markdown
    validations:
      required: true

  - type: textarea
    id: completion-criteria
    attributes:
      label: Completion Criteria
      description: Concrete conditions that must be true before the PR is ready.
      placeholder: |
        - [ ] Regression is covered by a test.
        - [ ] Fix is documented where behavior changed.
        - [ ] `just check && just test` passes.
      render: markdown
    validations:
      required: true
