name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_COLOR: "1"
  TERM: dumb

jobs:
  check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (mypy strict)
        run: uv run mypy --strict
      - name: Type check (pyright — pylance parity)
        run: uv run pyright
      - name: Lock file up to date
        run: uv lock --locked
      - name: Install Rust toolchain (for agent-spec)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo + agent-spec binary
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/agent-spec
            ~/.cargo/registry
            ~/.cargo/git
          key: agent-spec-0.2.7-${{ runner.os }}
      - name: Install agent-spec
        run: |
          if ! command -v agent-spec >/dev/null 2>&1; then
            cargo install agent-spec --version 0.2.7 --locked
          fi
          agent-spec --version
      - name: Enforce specs (agent-spec lifecycle — lint hard, boundary/verify report)
        run: bash scripts/check_specs.sh
      - name: Verify .feature / .spec sync
        run: uv run python scripts/check_feature_sync.py
      - name: No banned agent frameworks (AGENT.md §4)
        run: uv run python scripts/check_banned_frameworks.py

  tests:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run python -m pytest --cov --cov-report=xml --cov-report=term
      - name: Enforce per-module coverage gates
        run: uv run python scripts/check_coverage.py --xml coverage.xml
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  web-ui:
    name: Web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/yaya/plugins/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('src/yaya/plugins/web/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install web adapter dependencies
        run: npm ci
      - name: TypeScript strict check
        run: npm run check
      - name: Unit tests (vitest)
        run: npm run test
      - name: Build Vite bundle
        run: npm run build
      - name: Verify fresh build references hashed assets
        shell: bash
        run: |
          set -euo pipefail
          IDX="src/yaya/plugins/web/static/index.html"
          if ! grep -qE '/assets/[A-Za-z0-9._-]+-[A-Za-z0-9_-]{8,}\.js' "$IDX"; then
            echo "static/index.html does not reference a Vite-hashed JS bundle" >&2
            echo "---content---" >&2
            head -50 "$IDX" >&2
            exit 1
          fi
          if ! grep -qE '/assets/[A-Za-z0-9._-]+-[A-Za-z0-9_-]{8,}\.css' "$IDX"; then
            echo "static/index.html does not reference a Vite-hashed CSS bundle" >&2
            exit 1
          fi
          # Reject known placeholder markers from the old vanilla-JS shell.
          if grep -qiE 'plugins-panel|preview' "$IDX"; then
            echo "static/index.html still contains placeholder markers" >&2
            exit 1
          fi
        working-directory: ${{ github.workspace }}

  build-wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [check, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Build distributions
        run: uvx --from build pyproject-build --installer uv
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  e2e-smoke:
    name: E2E smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build-wheel]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install wheel in a fresh venv and run smoke
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .smoke-venv
          # shellcheck disable=SC1091
          if [ -f .smoke-venv/bin/activate ]; then . .smoke-venv/bin/activate; else . .smoke-venv/Scripts/activate; fi
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl pytest pytest-timeout pytest-bdd pytest-asyncio websockets
          python -m pytest tests/e2e -v
      # Ubuntu-only sdist smoke. Source builds surface MANIFEST /
      # hatch `only-include` gaps that the wheel hides — the cheapest
      # guard against "sdist is missing bundled files" regressions
      # without tripling the OS matrix. See issue #41.
      - name: Install sdist in a fresh venv and run smoke
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .sdist-smoke-venv
          # shellcheck disable=SC1091
          . .sdist-smoke-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.tar.gz pytest pytest-timeout pytest-bdd pytest-asyncio websockets
          python -m pytest tests/e2e -v
