name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_COLOR: "1"
  TERM: dumb

jobs:
  check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (mypy strict)
        run: uv run mypy --strict
      - name: Type check (pyright — pylance parity)
        run: uv run pyright
      - name: Lock file up to date
        run: uv lock --locked
      - name: Install Rust toolchain (for agent-spec)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo + agent-spec binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/agent-spec
            ~/.cargo/registry
            ~/.cargo/git
          key: agent-spec-0.2.7-${{ runner.os }}
      - name: Install agent-spec
        run: |
          if ! command -v agent-spec >/dev/null 2>&1; then
            cargo install agent-spec --version 0.2.7 --locked
          fi
          agent-spec --version
      - name: Lint specs (agent-spec)
        run: bash scripts/check_specs.sh

  tests:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run python -m pytest --cov --cov-report=xml --cov-report=term
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  build-wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [check, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Build distributions
        run: uvx --from build pyproject-build --installer uv
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  e2e-smoke:
    name: E2E smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build-wheel]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install wheel in a fresh venv and run smoke
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .smoke-venv
          # shellcheck disable=SC1091
          if [ -f .smoke-venv/bin/activate ]; then . .smoke-venv/bin/activate; else . .smoke-venv/Scripts/activate; fi
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl pytest pytest-timeout
          python -m pytest tests/e2e -v
