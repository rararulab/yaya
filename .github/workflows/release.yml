name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Check version tag matches pyproject
        run: |
          python scripts/check_version_tag.py \
            --pyproject pyproject.toml \
            --expected-version "${GITHUB_REF_NAME}"

  build-wheel:
    name: Build wheel + sdist
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Build distributions
        run: uvx --from build pyproject-build --installer uv
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-dist
          path: dist/
          if-no-files-found: error

  build-bin:
    name: Build binary (${{ matrix.target }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ""
          - runner: macos-14
            target: aarch64-apple-darwin
            ext: ""
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Build onefile binary (PyInstaller)
        run: uv run pyinstaller yaya.spec --clean --noconfirm
        shell: bash
      - name: Smoke test binary
        shell: python
        run: |
          import os, subprocess
          exe = os.path.join("dist", "yaya" + os.environ["EXT"])
          result = subprocess.run([exe, "version"], capture_output=True, text=True, check=True)
          print(result.stdout)
          if "yaya" not in result.stdout:
              raise SystemExit("binary smoke test failed")
        env:
          EXT: ${{ matrix.ext }}
      - name: Package archive
        shell: python
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: |
          import os, pathlib, tarfile, zipfile

          tag = os.environ["TAG"]
          target = os.environ["TARGET"]
          ext = os.environ["EXT"]

          binary = pathlib.Path("dist") / f"yaya{ext}"
          if not binary.exists():
              raise SystemExit(f"binary not found: {binary}")

          out_dir = pathlib.Path("artifacts")
          out_dir.mkdir(exist_ok=True)

          if "windows" in target:
              out = out_dir / f"yaya-{tag}-{target}.zip"
              with zipfile.ZipFile(out, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  z.write(binary, arcname=f"yaya{ext}")
          else:
              out = out_dir / f"yaya-{tag}-{target}.tar.gz"
              with tarfile.open(out, "w:gz") as t:
                  t.add(binary, arcname="yaya")
          print(f"packaged: {out}")
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: [build-bin, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: downloads
          pattern: "bin-*"
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: wheel-dist
          path: downloads
      - name: Generate sha256 sums
        run: |
          set -euxo pipefail
          cd downloads
          shopt -s nullglob
          for f in *.tar.gz *.zip *.whl *.tar; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done
          ls -la
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            downloads/*.tar.gz
            downloads/*.zip
            downloads/*.whl
            downloads/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

