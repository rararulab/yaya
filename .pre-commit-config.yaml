repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.5.4
    hooks:
      - id: uv-lock

  # agent-spec enforcement. Runs only when a `.spec` file is staged.
  # Script runs lifecycle (lint hard-gated, boundary/verify reported).
  # If `agent-spec` is not installed locally, the wrapper prints a skip
  # notice (CI enforces). See docs/dev/agent-spec.md.
  - repo: local
    hooks:
      - id: agent-spec-enforce
        name: agent-spec lifecycle
        entry: bash scripts/check_specs.sh
        language: system
        pass_filenames: false
        files: ^specs/.*\.spec$
      - id: feature-spec-sync
        name: feature/spec sync
        entry: uv run python scripts/check_feature_sync.py
        language: system
        pass_filenames: false
        files: ^(specs/.*\.spec|tests/bdd/features/.*\.feature)$
