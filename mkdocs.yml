site_name: yaya
site_description: "A Python AI agent built with engineering rigor."
site_author: rararulab
site_url: https://rararulab.github.io/yaya/
repo_url: https://github.com/rararulab/yaya
repo_name: rararulab/yaya
edit_uri: edit/main/docs/
copyright: Copyright (c) 2026 <a href="https://github.com/rararulab">rararulab</a> contributors.

docs_dir: docs

nav:
  - Home: index.md
  - User Guide:
      - Install: guide/install.md
      - Usage: guide/usage.md
  - Development:
      - Architecture: dev/architecture.md
      - Workflow: dev/workflow.md
      - Multi-Agent: dev/multi-agent.md
      - CLI Conventions: dev/cli.md
      - Agent-Friendly CLI (org spec): dev/agent-friendly-cli.md
      - Testing: dev/testing.md
      - Agent Spec Conformance: dev/agent-spec.md
      - Release: dev/release.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/yaya"]

theme:
  name: terminal
  palette: dark
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rararulab/yaya
